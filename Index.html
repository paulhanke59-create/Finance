<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #020617;
      color: #f1f5f9;
      font-family: 'Inter', 'SF Pro Display', system-ui, sans-serif;
      min-height: 100vh;
      padding: 28px 20px 48px;
    }

    .wrap { max-width: 960px; margin: 0 auto; }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }
    .header-label {
      font-size: 10px;
      color: #1e3a5f;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .header-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #f1f5f9 30%, #475569);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .clock {
      text-align: right;
    }
    .clock-time {
      font-size: 22px;
      font-weight: 700;
      color: #64748b;
      font-variant-numeric: tabular-nums;
    }
    .market-status {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-top: 4px;
    }
    .market-open  { color: #22c55e; }
    .market-closed { color: #ef4444; }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, #1e293b 60%, transparent);
      margin-bottom: 24px;
    }

    /* Cards grid */
    .cards {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .card {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 14px;
      padding: 20px 22px;
      flex: 1 1 260px;
      position: relative;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      transition: border-color 0.4s;
      overflow: hidden;
    }
    .card.error { border-color: #450a0a; }

    .card-accent {
      position: absolute;
      top: 0; left: 16px; right: 16px;
      height: 2px;
      border-radius: 0 0 4px 4px;
      opacity: 0.85;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .card-wkn {
      font-size: 10px;
      color: #334155;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .card-isin {
      font-size: 11px;
      color: #334155;
      margin-top: 2px;
      font-family: monospace;
    }
    .card-name {
      font-size: 13px;
      font-weight: 700;
      color: #94a3b8;
      margin-top: 5px;
      max-width: 190px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-badge {
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
      position: relative;
    }
    .dot-pulse::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      animation: ping 1.5s cubic-bezier(0,0,0.2,1) infinite;
    }
    @keyframes ping { 75%,100%{ transform:scale(2.2); opacity:0; } }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin: 14px 0 4px;
    }
    .price-val {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -1px;
      color: #f1f5f9;
      font-variant-numeric: tabular-nums;
      transition: color 0.3s;
    }
    .price-loading { color: #1e293b !important; }
    .price-cur {
      font-size: 12px;
      color: #475569;
      font-weight: 600;
    }

    .change-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      min-height: 22px;
    }
    .change-abs {
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .change-pct {
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    /* Sparkline */
    .sparkline-wrap { margin-bottom: 10px; }
    .sparkline-wrap svg { display: block; }

    /* Bid/Ask */
    .bidask {
      display: flex;
      gap: 20px;
      margin-bottom: 10px;
    }
    .bidask-label {
      font-size: 9px;
      color: #334155;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .bidask-val {
      font-size: 12px;
      color: #64748b;
      font-variant-numeric: tabular-nums;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }
    .card-footer span {
      font-size: 10px;
      color: #1e293b;
    }

    /* Footer note */
    .footnote {
      margin-top: 24px;
      font-size: 10px;
      color: #1e293b;
      line-height: 1.8;
    }

    @media (max-width: 600px) {
      .card { flex: 1 1 100%; }
      .price-val { font-size: 28px; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div>
      <div class="header-label">Finance · Echtzeit-Kurse</div>
      <div class="header-title">Derivate Monitor</div>
    </div>
    <div class="clock">
      <div class="clock-time" id="clock">--:--:--</div>
      <div class="market-status" id="market-status">● --</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="cards" id="cards"></div>

  <div class="footnote">
    Kurse werden via KI-gestützter Websuche abgerufen · Aktualisierung alle 30 Sekunden · Kurse können leicht verzögert sein
  </div>

</div>

<script>
const SECURITIES = [
  { isin: "DE000FA00477", wkn: "FA0047" },
  { isin: "DE000WA5P612", wkn: "WA5P61" },
  { isin: "DE000MJ9HX30", wkn: "MJ9HX3" },
];

const REFRESH_MS = 30000;
const state = {}; // isin -> { quote, history, countdown, status, updated }

// ── Clock ──────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById("clock").textContent = now.toLocaleTimeString("de-DE");
  const h = now.getHours(), m = now.getMinutes(), d = now.getDay();
  const mins = h * 60 + m;
  const open = d > 0 && d < 6 && mins >= 9*60 && mins <= 22*60;
  const el = document.getElementById("market-status");
  el.textContent = open ? "● MARKT AKTIV" : "● MARKT GESCHLOSSEN";
  el.className = "market-status " + (open ? "market-open" : "market-closed");
}
setInterval(updateClock, 1000);
updateClock();

// ── Fetch via Anthropic API with web search ─────────────────────────────────
async function fetchQuote(isin, wkn) {
  const prompt = `Suche den aktuellen Börsenkurs für das Wertpapier mit ISIN ${isin} (WKN: ${wkn}).
Antworte NUR mit einem JSON-Objekt ohne Markdown, exakt in diesem Format:
{"name":"Produktname","price":12.34,"currency":"EUR","change":0.12,"changePct":0.98,"bid":12.30,"ask":12.38,"time":"HH:MM","exchange":"Börsenplatz"}
Falls ein Wert nicht verfügbar ist, setze null. Keine anderen Texte.`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 500,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [{ role: "user", content: prompt }]
    })
  });
  if (!res.ok) throw new Error("API " + res.status);
  const data = await res.json();
  const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
  const m = text.match(/\{[\s\S]*?\}/);
  if (!m) throw new Error("Kein JSON");
  return JSON.parse(m[0]);
}

// ── Sparkline SVG ───────────────────────────────────────────────────────────
function sparklineSVG(history, color) {
  if (!history || history.length < 2) return "";
  const vals = history.map(h => h.p);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 0.001;
  const W = 130, H = 38, P = 3;
  const pts = vals.map((v, i) => {
    const x = P + (i / (vals.length - 1)) * (W - P*2);
    const y = H - P - ((v - min) / range) * (H - P*2);
    return x.toFixed(1) + "," + y.toFixed(1);
  }).join(" ");
  return `<svg width="${W}" height="${H}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

// ── Format number ───────────────────────────────────────────────────────────
function fmt(v, decimals) {
  if (v == null) return "—";
  return v.toLocaleString("de-DE", { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

// ── Render card ─────────────────────────────────────────────────────────────
function renderCard(isin, wkn) {
  const s = state[isin];
  const q = s.quote;
  const up = q && q.changePct > 0;
  const dn = q && q.changePct < 0;
  const accent = up ? "#22c55e" : dn ? "#ef4444" : "#64748b";
  const accentBg = up ? "#052e16" : dn ? "#450a0a" : "#1e293b";

  // Status badge
  let badgeColor, badgeText;
  if (s.status === "loading") { badgeColor="#f59e0b"; badgeText="LADEN"; }
  else if (s.status === "ok")  { badgeColor="#22c55e"; badgeText="LIVE"; }
  else                          { badgeColor="#ef4444"; badgeText="FEHLER"; }

  const priceDecimals = q && q.price != null ? (q.price < 1 ? 4 : q.price < 10 ? 3 : 2) : 2;

  const el = document.getElementById("card-" + isin);
  el.className = "card" + (s.status === "error" ? " error" : "");

  el.innerHTML = `
    <div class="card-accent" style="background:${accent}"></div>

    <div class="card-head">
      <div>
        <div class="card-wkn">${wkn} · XFRA</div>
        <div class="card-isin">${isin}</div>
        ${q && q.name ? `<div class="card-name">${q.name}</div>` : ""}
      </div>
      <div class="status-badge" style="color:${badgeColor}">
        <span class="dot dot-pulse" style="background:${badgeColor}"></span>
        ${badgeText}
      </div>
    </div>

    <div class="price-row">
      <span class="price-val ${!q ? 'price-loading' : ''}">${q ? fmt(q.price, priceDecimals) : "···"}</span>
      <span class="price-cur">${q ? (q.currency || "EUR") : ""}</span>
    </div>

    <div class="change-row">
      ${q && q.change != null ? `
        <span class="change-abs" style="color:${accent}">
          ${q.change >= 0 ? "▲" : "▼"} ${q.change >= 0 ? "+" : ""}${fmt(q.change, 3)}
        </span>
      ` : ""}
      ${q && q.changePct != null ? `
        <span class="change-pct" style="background:${accentBg};color:${accent}">
          ${q.changePct >= 0 ? "+" : ""}${fmt(q.changePct, 2)}%
        </span>
      ` : ""}
    </div>

    ${s.history.length >= 2 ? `<div class="sparkline-wrap">${sparklineSVG(s.history, accent)}</div>` : ""}

    ${q && (q.bid || q.ask) ? `
      <div class="bidask">
        ${q.bid != null ? `<div><div class="bidask-label">Geld</div><div class="bidask-val">${fmt(q.bid, 3)}</div></div>` : ""}
        ${q.ask != null ? `<div><div class="bidask-label">Brief</div><div class="bidask-val">${fmt(q.ask, 3)}</div></div>` : ""}
      </div>
    ` : ""}

    <div class="card-footer">
      <span>${s.updated ? s.updated.toLocaleTimeString("de-DE") : ""}${q && q.time ? " · " + q.time : ""}</span>
      <span>${s.status === "ok" ? "↻ " + s.countdown + "s" : ""}</span>
    </div>
  `;
}

// ── Init cards DOM ──────────────────────────────────────────────────────────
const container = document.getElementById("cards");
SECURITIES.forEach(({ isin, wkn }) => {
  state[isin] = { quote: null, history: [], status: "loading", updated: null, countdown: REFRESH_MS / 1000 };
  const div = document.createElement("div");
  div.className = "card";
  div.id = "card-" + isin;
  container.appendChild(div);
  renderCard(isin, wkn);
});

// ── Load + refresh loop ─────────────────────────────────────────────────────
async function loadQuote(isin, wkn) {
  state[isin].status = "loading";
  renderCard(isin, wkn);
  try {
    const q = await fetchQuote(isin, wkn);
    state[isin].quote = q;
    state[isin].status = "ok";
    state[isin].updated = new Date();
    state[isin].countdown = REFRESH_MS / 1000;
    if (q.price != null) {
      state[isin].history.push({ p: q.price, t: Date.now() });
      if (state[isin].history.length > 40) state[isin].history.shift();
    }
  } catch(e) {
    state[isin].status = "error";
    console.error(isin, e);
  }
  renderCard(isin, wkn);
}

// Countdown ticker
setInterval(() => {
  SECURITIES.forEach(({ isin, wkn }) => {
    if (state[isin].status !== "ok") return;
    state[isin].countdown = Math.max(0, state[isin].countdown - 1);
    // Only re-render footer
    const footer = document.querySelector("#card-" + isin + " .card-footer span:last-child");
    if (footer) footer.textContent = "↻ " + state[isin].countdown + "s";
  });
}, 1000);

// Initial load staggered
SECURITIES.forEach(({ isin, wkn }, i) => {
  setTimeout(() => {
    loadQuote(isin, wkn);
    setInterval(() => loadQuote(isin, wkn), REFRESH_MS);
  }, i * 2000); // stagger by 2s each to avoid rate limits
});
</script>
</body>
</html>
