<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #020617;
      color: #f1f5f9;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      padding: 28px 20px 48px;
    }
    .wrap { max-width: 960px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }
    .header-label { font-size: 10px; color: #1e3a5f; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
    .header-title {
      font-size: 26px; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #f1f5f9 30%, #475569);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .clock { text-align: right; }
    .clock-time { font-size: 22px; font-weight: 700; color: #64748b; font-variant-numeric: tabular-nums; }
    .market-status { font-size: 10px; font-weight: 700; letter-spacing: 1px; margin-top: 4px; }
    .market-open { color: #22c55e; }
    .market-closed { color: #ef4444; }
    .divider { height: 1px; background: linear-gradient(90deg, #1e293b 60%, transparent); margin-bottom: 24px; }
    .cards { display: flex; gap: 16px; flex-wrap: wrap; }
    .card {
      background: #0f172a; border: 1px solid #1e293b; border-radius: 14px;
      padding: 20px 22px; flex: 1 1 260px; position: relative;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5); overflow: hidden; min-height: 160px;
    }
    .card.error { border-color: #450a0a; }
    .card-accent { position: absolute; top: 0; left: 16px; right: 16px; height: 2px; border-radius: 0 0 4px 4px; opacity: 0.85; }
    .card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .card-wkn { font-size: 10px; color: #334155; letter-spacing: 2px; text-transform: uppercase; }
    .card-isin { font-size: 11px; color: #334155; margin-top: 2px; font-family: monospace; }
    .card-name { font-size: 13px; font-weight: 700; color: #94a3b8; margin-top: 5px; max-width: 190px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status-badge { font-size: 10px; font-weight: 700; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    .dot-pulse { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .price-row { display: flex; align-items: baseline; gap: 8px; margin: 14px 0 4px; }
    .price-val { font-size: 34px; font-weight: 800; letter-spacing: -1px; color: #f1f5f9; font-variant-numeric: tabular-nums; }
    .price-loading { color: #1e293b !important; }
    .price-cur { font-size: 12px; color: #475569; font-weight: 600; }
    .change-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; min-height: 22px; }
    .change-abs { font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; }
    .change-pct { border-radius: 6px; padding: 2px 8px; font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .sparkline-wrap { margin-bottom: 10px; }
    .sparkline-wrap svg { display: block; }
    .bidask { display: flex; gap: 20px; margin-bottom: 10px; }
    .bidask-label { font-size: 9px; color: #334155; letter-spacing: 1px; text-transform: uppercase; }
    .bidask-val { font-size: 12px; color: #64748b; font-variant-numeric: tabular-nums; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    .card-footer span { font-size: 10px; color: #1e293b; }
    .error-msg { font-size: 11px; color: #ef4444; margin-top: 12px; line-height: 1.5; }
    .footnote { margin-top: 24px; font-size: 10px; color: #1e293b; line-height: 1.8; }
    @media (max-width: 600px) { .card { flex: 1 1 100%; } .price-val { font-size: 28px; } }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <div class="header-label">Finance · Echtzeit-Kurse</div>
      <div class="header-title">Derivate Monitor</div>
    </div>
    <div class="clock">
      <div class="clock-time" id="clock">--:--:--</div>
      <div class="market-status" id="market-status">● --</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="cards" id="cards"></div>
  <div class="footnote">Kurse via Börse Frankfurt (XFRA) · Aktualisierung alle 15 Sekunden · Kurse können leicht verzögert sein</div>
</div>

<script>
var SECURITIES = [
  { isin: "DE000FA00477", wkn: "FA0047" },
  { isin: "DE000WA5P612", wkn: "WA5P61" },
  { isin: "DE000MJ9HX30", wkn: "MJ9HX3" }
];
var REFRESH_MS = 15000;

// CORS proxy list — no AbortSignal, simple timeout via Promise.race
var PROXIES = [
  function(u){ return "https://corsproxy.io/?url=" + encodeURIComponent(u); },
  function(u){ return "https://api.allorigins.win/raw?url=" + encodeURIComponent(u); },
  function(u){ return "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(u); }
];

var state = {};

// ── Clock ──
function updateClock() {
  var now = new Date();
  document.getElementById("clock").textContent = now.toLocaleTimeString("de-DE");
  var h = now.getHours(), m = now.getMinutes(), d = now.getDay();
  var mins = h * 60 + m;
  var open = d > 0 && d < 6 && mins >= 540 && mins <= 1320;
  var el = document.getElementById("market-status");
  el.textContent = open ? "● MARKT AKTIV" : "● MARKT GESCHLOSSEN";
  el.className = "market-status " + (open ? "market-open" : "market-closed");
}
setInterval(updateClock, 1000);
updateClock();

// ── Timeout helper (no AbortSignal) ──
function fetchWithTimeout(url, ms) {
  return new Promise(function(resolve, reject) {
    var done = false;
    var timer = setTimeout(function() {
      if (!done) { done = true; reject(new Error("Timeout")); }
    }, ms);
    fetch(url).then(function(r) {
      if (!done) { done = true; clearTimeout(timer); resolve(r); }
    }).catch(function(e) {
      if (!done) { done = true; clearTimeout(timer); reject(e); }
    });
  });
}

// ── Fetch with proxy fallback ──
function fetchWithProxy(targetUrl, attempt) {
  attempt = attempt || 0;
  if (attempt >= PROXIES.length) return Promise.reject(new Error("Alle Proxies fehlgeschlagen"));
  var proxyUrl = PROXIES[attempt](targetUrl);
  return fetchWithTimeout(proxyUrl, 8000)
    .then(function(res) {
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.text();
    })
    .then(function(text) {
      return JSON.parse(text);
    })
    .catch(function(e) {
      return fetchWithProxy(targetUrl, attempt + 1);
    });
}

// ── Fetch quote ──
function fetchQuote(isin) {
  var url = "https://api.boerse-frankfurt.de/v1/data/price_information?isin=" + isin + "&mic=XFRA";
  return fetchWithProxy(url).then(function(data) {
    var price     = data.lastPrice != null ? data.lastPrice : (data.close != null ? data.close : null);
    var prevClose = data.previousClosePrice != null ? data.previousClosePrice : (data.previousClose != null ? data.previousClose : null);
    var change    = (price != null && prevClose != null) ? price - prevClose : null;
    var changePct = (change != null && prevClose) ? (change / prevClose) * 100 : null;
    var name      = (data.name && data.name.originalValue) ? data.name.originalValue : (data.name || null);
    var currency  = (data.currency && data.currency.originalValue) ? data.currency.originalValue : (data.currency || "EUR");
    var bid       = data.bid != null ? data.bid : null;
    var ask       = data.ask != null ? data.ask : null;
    var time      = data.lastPriceTimestamp
      ? new Date(data.lastPriceTimestamp).toLocaleTimeString("de-DE", {hour:"2-digit", minute:"2-digit"})
      : null;
    return { price: price, change: change, changePct: changePct, name: name, currency: currency, bid: bid, ask: ask, time: time };
  });
}

// ── Sparkline ──
function sparklineSVG(history, color) {
  if (!history || history.length < 2) return "";
  var vals = history.map(function(h){ return h.p; });
  var min = Math.min.apply(null, vals), max = Math.max.apply(null, vals);
  var range = max - min || 0.001;
  var W = 130, H = 38, P = 3;
  var pts = vals.map(function(v, i) {
    var x = P + (i / (vals.length - 1)) * (W - P*2);
    var y = H - P - ((v - min) / range) * (H - P*2);
    return x.toFixed(1) + "," + y.toFixed(1);
  }).join(" ");
  return '<svg width="' + W + '" height="' + H + '"><polyline points="' + pts + '" fill="none" stroke="' + color + '" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/></svg>';
}

function fmt(v, d) {
  if (v == null) return "—";
  return v.toLocaleString("de-DE", { minimumFractionDigits: d, maximumFractionDigits: d });
}

// ── Render ──
function renderCard(isin, wkn) {
  var s = state[isin];
  var q = s.quote;
  var up = q && q.changePct > 0;
  var dn = q && q.changePct < 0;
  var accent   = up ? "#22c55e" : dn ? "#ef4444" : "#64748b";
  var accentBg = up ? "#052e16" : dn ? "#450a0a" : "#1e293b";

  var badgeColor, badgeText;
  if      (s.status === "loading") { badgeColor="#f59e0b"; badgeText="LADEN"; }
  else if (s.status === "ok")      { badgeColor="#22c55e"; badgeText="LIVE"; }
  else                              { badgeColor="#ef4444"; badgeText="FEHLER"; }

  var decimals = q && q.price != null ? (q.price < 1 ? 4 : q.price < 10 ? 3 : 2) : 2;
  var el = document.getElementById("card-" + isin);
  el.className = "card" + (s.status === "error" && !q ? " error" : "");

  var html = '<div class="card-accent" style="background:' + accent + '"></div>';
  html += '<div class="card-head"><div>';
  html += '<div class="card-wkn">' + wkn + ' · XFRA</div>';
  html += '<div class="card-isin">' + isin + '</div>';
  if (q && q.name) html += '<div class="card-name">' + q.name + '</div>';
  html += '</div>';
  html += '<div class="status-badge" style="color:' + badgeColor + '">';
  html += '<span class="dot' + (s.status === "loading" ? " dot-pulse" : "") + '" style="background:' + badgeColor + '"></span>';
  html += badgeText + '</div></div>';

  html += '<div class="price-row">';
  html += '<span class="price-val' + (!q ? ' price-loading' : '') + '">' + (q ? fmt(q.price, decimals) : '···') + '</span>';
  html += '<span class="price-cur">' + (q ? q.currency : 'EUR') + '</span>';
  html += '</div>';

  html += '<div class="change-row">';
  if (q && q.change != null) {
    html += '<span class="change-abs" style="color:' + accent + '">' + (q.change >= 0 ? "▲ +" : "▼ ") + fmt(q.change, 3) + '</span>';
  }
  if (q && q.changePct != null) {
    html += '<span class="change-pct" style="background:' + accentBg + ';color:' + accent + '">' + (q.changePct >= 0 ? "+" : "") + fmt(q.changePct, 2) + '%</span>';
  }
  html += '</div>';

  if (s.history.length >= 2) {
    html += '<div class="sparkline-wrap">' + sparklineSVG(s.history, accent) + '</div>';
  }

  if (q && (q.bid != null || q.ask != null)) {
    html += '<div class="bidask">';
    if (q.bid != null) html += '<div><div class="bidask-label">Geld</div><div class="bidask-val">' + fmt(q.bid, 3) + '</div></div>';
    if (q.ask != null) html += '<div><div class="bidask-label">Brief</div><div class="bidask-val">' + fmt(q.ask, 3) + '</div></div>';
    html += '</div>';
  }

  if (s.status === "error" && !q) {
    html += '<div class="error-msg">Kurs konnte nicht geladen werden. Nächster Versuch in ' + s.countdown + 's.</div>';
  }

  html += '<div class="card-footer">';
  html += '<span>' + (s.updated ? s.updated.toLocaleTimeString("de-DE") : "") + (q && q.time ? " · " + q.time : "") + '</span>';
  html += '<span>' + (s.status !== "loading" ? "↻ " + s.countdown + "s" : "") + '</span>';
  html += '</div>';

  el.innerHTML = html;
}

// ── Init DOM ──
var container = document.getElementById("cards");
SECURITIES.forEach(function(sec) {
  state[sec.isin] = { quote: null, history: [], status: "loading", updated: null, countdown: REFRESH_MS / 1000 };
  var div = document.createElement("div");
  div.className = "card";
  div.id = "card-" + sec.isin;
  container.appendChild(div);
  renderCard(sec.isin, sec.wkn);
});

// ── Load ──
function loadQuote(isin, wkn) {
  state[isin].status = "loading";
  renderCard(isin, wkn);
  fetchQuote(isin).then(function(q) {
    state[isin].quote = q;
    state[isin].status = "ok";
    state[isin].updated = new Date();
    state[isin].countdown = REFRESH_MS / 1000;
    if (q.price != null) {
      state[isin].history.push({ p: q.price, t: Date.now() });
      if (state[isin].history.length > 40) state[isin].history.shift();
    }
    renderCard(isin, wkn);
  }).catch(function(e) {
    state[isin].status = "error";
    state[isin].countdown = REFRESH_MS / 1000;
    renderCard(isin, wkn);
  });
}

// Countdown ticker
setInterval(function() {
  SECURITIES.forEach(function(sec) {
    if (state[sec.isin].status === "loading") return;
    state[sec.isin].countdown = Math.max(0, state[sec.isin].countdown - 1);
    var footer = document.querySelector("#card-" + sec.isin + " .card-footer span:last-child");
    if (footer) footer.textContent = "↻ " + state[sec.isin].countdown + "s";
    var errEl = document.querySelector("#card-" + sec.isin + " .error-msg");
    if (errEl) errEl.textContent = "Kurs konnte nicht geladen werden. Nächster Versuch in " + state[sec.isin].countdown + "s.";
  });
}, 1000);

// Staggered start
SECURITIES.forEach(function(sec, i) {
  setTimeout(function() {
    loadQuote(sec.isin, sec.wkn);
    setInterval(function() { loadQuote(sec.isin, sec.wkn); }, REFRESH_MS);
  }, i * 1500);
});
</script>
</body>
</html>
