<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #020617;
      color: #f1f5f9;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }
    .wrap { max-width: 960px; margin: 0 auto; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .header-label {
      font-size: 10px; color: #1e3a5f;
      letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px;
    }
    .header-title {
      font-size: 24px; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #f1f5f9 30%, #475569);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .clock { text-align: right; }
    .clock-time { font-size: 20px; font-weight: 700; color: #64748b; font-variant-numeric: tabular-nums; }
    .market-status { font-size: 10px; font-weight: 700; letter-spacing: 1px; margin-top: 4px; }
    .market-open { color: #22c55e; }
    .market-closed { color: #ef4444; }

    .divider { height: 1px; background: linear-gradient(90deg, #1e293b 60%, transparent); margin-bottom: 20px; }

    /* Cards */
    .cards { display: flex; flex-direction: column; gap: 16px; }

    .card {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      position: relative;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px 10px;
      border-bottom: 1px solid #1e293b;
    }
    .card-meta { }
    .card-wkn { font-size: 10px; color: #334155; letter-spacing: 2px; text-transform: uppercase; }
    .card-isin { font-size: 11px; color: #475569; font-family: monospace; margin-top: 2px; }
    .card-name { font-size: 13px; font-weight: 700; color: #94a3b8; margin-top: 4px; }

    .card-link {
      font-size: 10px;
      color: #3b82f6;
      text-decoration: none;
      padding: 5px 10px;
      border: 1px solid #1e40af;
      border-radius: 6px;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .card-link:hover { background: #1e3a5f; }

    /* Embed iframe */
    .card-embed {
      width: 100%;
      border: none;
      display: block;
      min-height: 90px;
      background: #0f172a;
    }

    .footnote {
      margin-top: 20px;
      font-size: 10px;
      color: #1e293b;
      line-height: 1.8;
      text-align: center;
    }

    @media (min-width: 640px) {
      .cards { flex-direction: row; flex-wrap: wrap; }
      .card { flex: 1 1 280px; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <div class="header-label">Finance · Live-Kurse</div>
      <div class="header-title">Derivate Monitor</div>
    </div>
    <div class="clock">
      <div class="clock-time" id="clock">--:--:--</div>
      <div class="market-status" id="market-status">● --</div>
    </div>
  </div>
  <div class="divider"></div>

  <div class="cards">

    <!-- Card 1: DE000FA00477 -->
    <div class="card">
      <div class="card-top">
        <div class="card-meta">
          <div class="card-wkn">FA0047 · XFRA</div>
          <div class="card-isin">DE000FA00477</div>
          <div class="card-name">Faktor-Zertifikat</div>
        </div>
        <a class="card-link" href="https://www.ariva.de/DE000FA00477" target="_blank">↗ Ariva</a>
      </div>
      <iframe class="card-embed" style="height:100px;"
        src="https://kurse.ariva.de/quote/widget?isin=DE000FA00477&boerse_id=132&layout=standard&colorscheme=dark&showChart=0"
        title="Kurs DE000FA00477">
      </iframe>
    </div>

    <!-- Card 2: DE000WA5P612 -->
    <div class="card">
      <div class="card-top">
        <div class="card-meta">
          <div class="card-wkn">WA5P61 · XFRA</div>
          <div class="card-isin">DE000WA5P612</div>
          <div class="card-name">Faktor-Zertifikat</div>
        </div>
        <a class="card-link" href="https://www.ariva.de/DE000WA5P612" target="_blank">↗ Ariva</a>
      </div>
      <iframe class="card-embed" style="height:100px;"
        src="https://kurse.ariva.de/quote/widget?isin=DE000WA5P612&boerse_id=132&layout=standard&colorscheme=dark&showChart=0"
        title="Kurs DE000WA5P612">
      </iframe>
    </div>

    <!-- Card 3: DE000MJ9HX30 -->
    <div class="card">
      <div class="card-top">
        <div class="card-meta">
          <div class="card-wkn">MJ9HX3 · XFRA</div>
          <div class="card-isin">DE000MJ9HX30</div>
          <div class="card-name">Faktor-Zertifikat</div>
        </div>
        <a class="card-link" href="https://www.ariva.de/DE000MJ9HX30" target="_blank">↗ Ariva</a>
      </div>
      <iframe class="card-embed" style="height:100px;"
        src="https://kurse.ariva.de/quote/widget?isin=DE000MJ9HX30&boerse_id=132&layout=standard&colorscheme=dark&showChart=0"
        title="Kurs DE000MJ9HX30">
      </iframe>
    </div>

  </div>

  <div class="footnote">
    Live-Kurse via Ariva.de · Börse Frankfurt (XFRA) · Automatisch aktualisiert
  </div>
</div>

<script>
  function updateClock() {
    var now = new Date();
    document.getElementById("clock").textContent = now.toLocaleTimeString("de-DE");
    var h = now.getHours(), m = now.getMinutes(), d = now.getDay();
    var mins = h * 60 + m;
    var open = d > 0 && d < 6 && mins >= 540 && mins <= 1320;
    var el = document.getElementById("market-status");
    el.textContent = open ? "● MARKT AKTIV" : "● MARKT GESCHLOSSEN";
    el.className = "market-status " + (open ? "market-open" : "market-closed");
  }
  setInterval(updateClock, 1000);
  updateClock();

  // Reload iframes every 60 seconds for fresh quotes
  setInterval(function() {
    var frames = document.querySelectorAll(".card-embed");
    frames.forEach(function(f) {
      var src = f.src;
      f.src = "";
      setTimeout(function(){ f.src = src; }, 100);
    });
  }, 60000);
</script>
</body>
</html>
